<!DOCTYPE html>
<html>

<body>
<script>
function addZero(i) {
  if (i < 10) {
    i = "0" + i;
  }
  return i;
}

var d = new Date();

var fullYear = d.getFullYear().toString();
var year = fullYear.substr(fullYear.length-2);

var min = addZero(d.getMinutes());
var hour = addZero(d.getHours());
var date = addZero(d.getDate());
var month = addZero(d.getMonth()+1);  // January=0 December=11

document.write(month);
document.write(date);
document.write(hour);
document.write(min);
document.write(year);
</script>
</body>

</html>
