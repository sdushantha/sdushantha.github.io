baseURL = "/"
title = "Siddharth Dushantha"

theme = "hugo-coder"

languageCode = "en"
defaultContentLanguage = "en"

paginate = 20

pygmentsStyle = "b2"
pygmentsCodeFences = true
pygmentsCodeFencesGuessSyntax = true

[params]
    author = "Siddharth Dushantha"
    description = ""
    keywords = "blog,developer,personal"
    info = "Opensource Developer"
    avatarURL = "avatar.png"
    footerContent = ""

    dateFormat = "January 2, 2006"

    hideFooter = true 
    hideCredits = false
    hideCopyright = false
    since = 2021

    # Git Commit in Footer, uncomment the line below to enable it.
    #commit = "https://github.com/luizdepra/hugo-coder/tree/"

    rtl = false

    # Specify light/dark colorscheme
    # Supported values:
    # "auto" (use preference set by browser)
    # "dark" (dark background, light foreground)
    # "light" (light background, dark foreground) (default)
    colorScheme = "auto"

    # Hide the toggle button, along with the associated vertical divider
    hideColorSchemeToggle = false

    # Series see also post count
    maxSeeAlsoItems = 5

    # Enable Twemoji
    enableTwemoji = true

    # Custom CSS
    customCSS = []

    # Custom SCSS
    customSCSS = []

    # Custom JS
    customJS = []


[[params.social]]
    name = "Github"
    icon = "fa fa-github"
    weight = 1
    url = "https://github.com/sdushantha/"
[[params.social]]
    name = "Twitter"
    icon = "fa fa-twitter"
    weight = 3
    url = "https://twitter.com/sidheart/"
[[params.social]]
    name = "LinkedIn"
    icon = "fa fa-linkedin"
    weight = 4
    url = "https://www.linkedin.com/in/siddharth-dushantha/"
[[params.social]]
    name = "Medium"
    icon = "fa fa-medium"
    weight = 5
    url = "https://medium.com/@sdushantha"

[languages]
    [languages.en]
        languageName = "English"

        [languages.en.menu]
            
            [[languages.en.menu.main]]
            name = "Blog"
            weight = 1
            url = "posts/"
            
            [[languages.en.menu.main]]
            name = "Bookmarklets"
            weight = 2
            url = "bookmarklets/"

            [[languages.en.menu.main]]
            name = "About"
            weight = 3
            url = "about/"
